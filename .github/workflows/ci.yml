name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build wheel and sdist
        run: python -m build

      - name: Build material artifacts
        run: python -m chimeralang_mcp build --output-dir .chimera-build

      - name: Inspect material status
        run: python -m chimeralang_mcp status --output-dir .chimera-build

  conformance:
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install package
        run: python -m pip install -e ".[conformance]"

      - name: Start HTTP MCP server
        run: |
          python -m chimeralang_mcp server --transport http --host 127.0.0.1 --port 8765 > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health endpoint
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8765/healthz"
          last_error = None
          for _ in range(30):
              try:
                  with urllib.request.urlopen(url, timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          raise SystemExit(f"health check failed: {last_error}")
          PY

      - name: Run MCP conformance initialize scenario
        run: npx --yes @modelcontextprotocol/conformance@0.1.16 server --url http://127.0.0.1:8765/mcp --scenario server-initialize

      - name: Show server log on failure
        if: failure()
        run: cat server.log

      - name: Stop HTTP MCP server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
